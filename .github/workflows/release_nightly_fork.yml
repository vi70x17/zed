name: release_nightly_fork
env:
  CARGO_TERM_COLOR: always
on:
  workflow_dispatch: {}
jobs:
  bundle_linux_x86_64:
    runs-on: ubuntu-22.04
    env:
      CC: clang
      CXX: clang++
      CXXFLAGS: -fpermissive -Wno-error
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Set release channel to nightly
        run: |
          sed -i 's/\(release_channel = \)"[^"]*"/\1"nightly"/' crates/zed/Cargo.toml

      - name: Install system dependencies
        run: ./script/linux

      - name: Download wasi-sdk
        run: ./script/download-wasi-sdk

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build release binary
        run: cargo build --release --package zed --package remote_server

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/zed release/
          cp target/release/remote_server release/zed-remote-server

      - name: Install Arch packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Build CLI for Arch package
        run: cargo build --release --package cli

      - name: Package Arch Linux
        run: ./script/package-arch-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-x86_64-nightly
          path: release/

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: zed-arch-linux-x86_64-nightly
          path: target/release/zed-nightly-*.pkg.tar.zst

  bundle_mac_aarch64:
    runs-on: macos-14
    env:
      CC: ${{ github.workspace }}/script/ci-webrtc-compat/cc
      CXX: ${{ github.workspace }}/script/ci-webrtc-compat/cxx
      CXXFLAGS: -fpermissive -Wno-error
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Set release channel to nightly
        run: |
          sed -i '' 's/\(release_channel = \)"[^"]*"/\1"nightly"/' crates/zed/Cargo.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build release binary
        env:
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: '1'
          CARGO_PROFILE_RELEASE_LTO: 'true'
        run: cargo build --release --package zed --package remote_server --target aarch64-apple-darwin

      - name: Package binary
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/zed release/
          cp target/aarch64-apple-darwin/release/remote_server release/zed-remote-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-macos-aarch64-nightly
          path: release/

  bundle_windows_x86_64:
    runs-on: windows-2022
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
      CARGO_HOME: 'C:\.cargo'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable long paths
        shell: pwsh
        run: |
          try { Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1 -ErrorAction Stop } catch { }
          git config --system core.longpaths true

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Set release channel to nightly
        shell: pwsh
        run: |
          $path = "crates/zed/Cargo.toml"
          (Get-Content $path) -replace '(release_channel = )"[^"]*"', '$1"nightly"' | Set-Content $path

      - name: Build release binary
        run: cargo build --release --package zed --package remote_server

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item target/release/zed.exe release/
          Copy-Item target/release/remote_server.exe release/zed-remote-server.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-windows-x86_64-nightly
          path: release/
